<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>주소 입력 페이지</title>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "Noto Sans SC", sans-serif; background: #f4f6f8; color: #222; }
    .container { width: 100%; max-width: 640px; margin: 0 auto; background: #fff; border-radius: 18px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .language-row { display: flex; justify-content: flex-end; margin-bottom: 14px; }
    .language-row select { width: 150px; height: 44px; }
    h2 { margin-top: 0; font-size: 26px; text-align: center; }
    .input-group { margin-bottom: 18px; }
    label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 15px; }
    .required { color: #dc3545; }
    .helper-text { margin: 7px 2px 0; color: #6b7280; font-size: 12px; line-height: 1.45; }
    input[type="text"], select { width: 100%; height: 52px; padding: 0 14px; border: 1px solid #d0d7de; border-radius: 12px; font-size: 16px; background: #fff; outline: none; }
    input[type="text"]:focus, select:focus { border-color: #007bff; box-shadow: 0 0 0 3px rgba(0,123,255,0.13); }
    .readonly { background: #f1f3f5 !important; }
    button, input[type="button"] { height: 52px; border: none; border-radius: 12px; background: #007bff; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; }
    button:hover, input[type="button"]:hover { background: #005fd1; }
    .address-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .address-row input[type="text"] { flex: 1; }
    .address-row input[type="button"] { width: 120px; flex-shrink: 0; }
    #submitBtn { width: 100%; margin-top: 8px; font-size: 17px; }
    .payment-notice { padding: 13px 14px; margin: -2px 0 18px; border-radius: 12px; background: #eef6ff; border: 1px solid #cfe2ff; color: #174a7e; font-size: 13px; line-height: 1.5; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 9999; padding: 16px; }
    .modal-content { background: #fff; border-radius: 18px; padding: 20px; width: 100%; max-width: 640px; margin: 60px auto 0; position: relative; }
    .close-btn { position: absolute; top: 14px; right: 16px; font-size: 28px; cursor: pointer; color: #666; }
    .search-box { display: flex; gap: 8px; margin-top: 16px; }
    .search-box input[type="text"] { flex: 1; }
    .search-box input[type="button"] { width: 90px; flex-shrink: 0; }
    .results { margin-top: 16px; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; max-height: 320px; overflow-y: auto; }
    .result-item { padding: 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
    .result-item:hover { background: #f8fafc; }
    .result-item:last-child { border-bottom: none; }
    .status { padding: 18px; text-align: center; color: #666; line-height: 1.55; }
    .error { color: #dc3545; font-weight: 700; }
    .completion-page { display: none; min-height: 70vh; align-items: center; justify-content: center; text-align: center; }
    .completion-card { width: 100%; padding: 32px 20px; }
    .completion-icon { width: 74px; height: 74px; margin: 0 auto 20px; border-radius: 50%; background: #e8f7ee; color: #1f9d55; display: flex; align-items: center; justify-content: center; font-size: 42px; font-weight: 800; }
    .completion-card h2 { margin-bottom: 12px; }
    .completion-card p { margin: 0; color: #5f6b76; font-size: 15px; line-height: 1.65; }
    .completion-summary { margin-top: 24px; padding: 16px; border-radius: 12px; background: #f7f9fb; text-align: left; font-size: 14px; line-height: 1.7; }
    #submitBtn:disabled { background: #9bbce0; cursor: not-allowed; }
    @media (max-width: 480px) {
      body { padding: 10px; }
      .container { padding: 18px; border-radius: 16px; }
      h2 { font-size: 22px; }
      .address-row, .search-box { flex-direction: column; }
      .address-row input[type="button"], .search-box input[type="button"] { width: 100%; }
      .modal-content { margin-top: 20px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="language-row">
    <select id="languageSelect" onchange="handleLanguageChange(this.value)">
      <option value="ko">한국어</option>
      <option value="en">English</option>
      <option value="zh" selected>中文</option>
    </select>
  </div>

  <h2 id="pageTitle">정보 입력하기</h2>

  <form onsubmit="submitForm(event)">
    <div class="input-group">
      <label for="userId" id="userIdLabel">Red Note ID <span class="required">*</span></label>
      <input type="text" id="userId" placeholder="Red Note ID 입력" inputmode="numeric" pattern="[0-9]*" maxlength="20" autocomplete="off" oninput="this.value=this.value.replace(/[^0-9]/g,'')" required />
      <div class="helper-text" id="userIdHelper">숫자만 입력할 수 있습니다.</div>
    </div>

    <div class="input-group">
      <label for="payerName" id="payerNameLabel">입금자명 <span class="required">*</span></label>
      <input type="text" id="payerName" placeholder="WeChat 또는 Alipay 입금자명 입력" maxlength="40" autocomplete="name" required />
      <div class="helper-text" id="payerNameHelper">실제 송금할 때 표시되는 이름과 동일하게 입력해 주세요.</div>
    </div>

    <div class="payment-notice" id="paymentNotice">QR코드를 받은 후 WeChat Pay 또는 Alipay로 송금해 주세요.</div>

    <div class="input-group">
      <label for="category" id="categoryLabel">카테고리 <span class="required">*</span></label>
      <select id="category" required>
        <option value="" id="categoryDefault">선택하세요</option>
        <option value="chicken" data-ko="치킨" data-en="Chicken" data-zh="炸鸡">치킨</option>
        <option value="pizza" data-ko="피자" data-en="Pizza" data-zh="披萨">피자</option>
        <option value="korean" data-ko="한식" data-en="Korean Food" data-zh="韩餐">한식</option>
        <option value="tteokbokki" data-ko="떡볶이" data-en="Tteokbokki" data-zh="炒年糕">떡볶이</option>
        <option value="coffee" data-ko="커피" data-en="Coffee" data-zh="咖啡">커피</option>
        <option value="burger" data-ko="햄버거" data-en="Hamburger" data-zh="汉堡">햄버거</option>
      </select>
    </div>

    <div class="input-group">
      <label for="foodName" id="foodNameLabel">브랜드 / 음식명</label>
      <input type="text" id="foodName" placeholder="예: KFC, 엽기떡볶이" maxlength="80" />
    </div>

    <div class="input-group">
      <label id="addressLabel">주소 <span class="required">*</span></label>
      <div class="address-row">
        <input type="text" id="postcode" placeholder="우편번호" readonly class="readonly" />
        <input type="button" id="addressSearchBtn" value="주소 검색" onclick="openModal()" />
      </div>
      <input type="text" id="address" placeholder="기본 주소" readonly class="readonly" style="margin-bottom:8px;" required />
      <input type="text" id="detailAddress" placeholder="상세 주소 입력" />
    </div>

    <button id="submitBtn" type="submit">제출하기</button>
  </form>
</div>

<div id="completionPage" class="container completion-page" aria-live="polite">
  <div class="completion-card">
    <div class="completion-icon">✓</div>
    <h2 id="completionTitle">제출이 완료되었습니다</h2>
    <p id="completionMessage">주문 정보가 정상적으로 접수되었습니다.<br>이 페이지를 닫아 주세요.</p>
    <div id="completionSummary" class="completion-summary"></div>
  </div>
</div>

<div id="modal" class="modal" onclick="handleModalBackground(event)">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <h3 id="modalTitle">주소 검색</h3>
    <div class="search-box">
      <input type="text" id="searchQuery" placeholder="건물명 또는 주소 입력" />
      <input type="button" id="searchBtn" value="검색" onclick="searchPlace()" />
    </div>
    <div id="results" class="results"><div class="status">검색어를 입력하세요.</div></div>
  </div>
</div>

<script>
  let placesService;
  let mapsScript;
  let currentLanguage = "ko";
  let isSubmitting = false;

  const GOOGLE_MAP_LANGUAGE = {
    ko: "ko",
    en: "en",
    zh: "zh-CN"
  };

  const translations = {
    ko: {
      htmlLang: "ko", documentTitle: "주소 입력 페이지", pageTitle: "정보 입력하기",
      userIdLabel: "Red Note ID", userIdPlaceholder: "Red Note ID 입력", userIdHelper: "숫자만 입력할 수 있습니다.",
      payerNameLabel: "입금자명", payerNamePlaceholder: "WeChat 또는 Alipay 입금자명 입력", payerNameHelper: "실제 송금할 때 표시되는 이름과 동일하게 입력해 주세요.",
      paymentNotice: "QR코드를 받은 후 WeChat Pay 또는 Alipay로 송금해 주세요.", categoryLabel: "카테고리", categoryDefault: "선택하세요",
      foodNameLabel: "브랜드 / 음식명", foodNamePlaceholder: "예: KFC, 엽기떡볶이", addressLabel: "주소", postcodePlaceholder: "우편번호",
      addressSearchBtn: "주소 검색", addressPlaceholder: "기본 주소", detailAddressPlaceholder: "상세 주소 입력", submitBtn: "제출하기",
      modalTitle: "주소 검색", searchQueryPlaceholder: "건물명 또는 주소 입력", searchBtn: "검색", initialStatus: "검색어를 입력하세요.",
      searching: "검색 중...", noResults: "검색 결과가 없습니다.", apiNotReady: "Google Maps API가 아직 준비되지 않았습니다.",
      placesApiRequired: "Places API (Legacy) 활성화가 필요합니다.", billingRequired: "Google Cloud 결제 계정 연결이 필요합니다.",
      submitSuccess: "제출 완료!", completionTitle: "제출이 완료되었습니다", completionMessage: "주문 정보가 정상적으로 접수되었습니다.<br>중복 제출을 방지하기 위해 이 페이지에서는 다시 제출할 수 없습니다.", completionId: "Red Note ID", completionPayer: "입금자명", completionFood: "주문 내용", completionAddress: "주소", submitting: "제출 중...", addressRequired: "주소를 검색해서 선택해 주세요.",
      apiFailure: "구글 API 인증 실패\n\n1. Maps JavaScript API 활성화\n2. Places API (Legacy) 활성화\n3. 결제 카드 등록 여부 확인"
    },
    en: {
      htmlLang: "en", documentTitle: "Address Entry Page", pageTitle: "Enter Your Information",
      userIdLabel: "Red Note ID", userIdPlaceholder: "Enter your Red Note ID", userIdHelper: "Numbers only.",
      payerNameLabel: "Payment Sender Name", payerNamePlaceholder: "Enter the name used for WeChat or Alipay payment", payerNameHelper: "Enter the exact name that will appear on the payment.",
      paymentNotice: "After receiving the QR code, send payment via WeChat Pay or Alipay.", categoryLabel: "Category", categoryDefault: "Please select",
      foodNameLabel: "Brand / Food Name", foodNamePlaceholder: "Example: KFC, McDonald's", addressLabel: "Address", postcodePlaceholder: "Postal code",
      addressSearchBtn: "Search Address", addressPlaceholder: "Main address", detailAddressPlaceholder: "Enter detailed address", submitBtn: "Submit",
      modalTitle: "Address Search", searchQueryPlaceholder: "Enter a building name or address", searchBtn: "Search", initialStatus: "Enter a search term.",
      searching: "Searching...", noResults: "No results found.", apiNotReady: "Google Maps API is not ready yet.",
      placesApiRequired: "Places API (Legacy) must be enabled.", billingRequired: "A Google Cloud billing account must be connected.",
      submitSuccess: "Submitted successfully!", completionTitle: "Submission Complete", completionMessage: "Your order information has been received successfully.<br>To prevent duplicate submissions, this page cannot be submitted again.", completionId: "Red Note ID", completionPayer: "Payment Sender", completionFood: "Order", completionAddress: "Address", submitting: "Submitting...", addressRequired: "Please search for and select an address.",
      apiFailure: "Google API authentication failed.\n\n1. Enable Maps JavaScript API\n2. Enable Places API (Legacy)\n3. Check billing registration"
    },
    zh: {
      htmlLang: "zh-CN", documentTitle: "地址填写页面", pageTitle: "填写信息",
      userIdLabel: "Red Note ID", userIdPlaceholder: "请输入 Red Note ID", userIdHelper: "只能输入数字。",
      payerNameLabel: "付款人姓名", payerNamePlaceholder: "请输入微信或支付宝付款人姓名", payerNameHelper: "请填写与实际付款时显示完全一致的姓名。",
      paymentNotice: "收到二维码后，请使用微信支付或支付宝付款。", categoryLabel: "类别", categoryDefault: "请选择",
      foodNameLabel: "品牌 / 食品名称", foodNamePlaceholder: "例如：KFC、麦当劳", addressLabel: "地址", postcodePlaceholder: "邮政编码",
      addressSearchBtn: "搜索地址", addressPlaceholder: "基本地址", detailAddressPlaceholder: "请输入详细地址", submitBtn: "提交",
      modalTitle: "地址搜索", searchQueryPlaceholder: "请输入建筑名称或地址", searchBtn: "搜索", initialStatus: "请输入搜索内容。",
      searching: "正在搜索...", noResults: "没有找到结果。", apiNotReady: "Google Maps API 尚未准备完成。",
      placesApiRequired: "需要启用 Places API (Legacy)。", billingRequired: "需要连接 Google Cloud 结算账户。",
      submitSuccess: "提交成功！", completionTitle: "提交完成", completionMessage: "您的订单信息已成功提交。<br>为防止重复提交，本页面无法再次提交。", completionId: "Red Note ID", completionPayer: "付款人姓名", completionFood: "订单内容", completionAddress: "地址", submitting: "提交中...", addressRequired: "请搜索并选择地址。",
      apiFailure: "Google API 验证失败。\n\n1. 启用 Maps JavaScript API\n2. 启用 Places API (Legacy)\n3. 检查结算账户"
    }
  };

  function t() { return translations[currentLanguage]; }
  function setRequiredLabel(id, text) { document.getElementById(id).innerHTML = text + ' <span class="required">*</span>'; }

  function changeLanguage(language) {
    currentLanguage = language;
    const lang = t();
    document.documentElement.lang = lang.htmlLang;
    document.title = lang.documentTitle;
    document.getElementById("pageTitle").textContent = lang.pageTitle;
    setRequiredLabel("userIdLabel", lang.userIdLabel);
    document.getElementById("userId").placeholder = lang.userIdPlaceholder;
    document.getElementById("userIdHelper").textContent = lang.userIdHelper;
    setRequiredLabel("payerNameLabel", lang.payerNameLabel);
    document.getElementById("payerName").placeholder = lang.payerNamePlaceholder;
    document.getElementById("payerNameHelper").textContent = lang.payerNameHelper;
    document.getElementById("paymentNotice").textContent = lang.paymentNotice;
    setRequiredLabel("categoryLabel", lang.categoryLabel);
    document.getElementById("categoryDefault").textContent = lang.categoryDefault;
    document.querySelectorAll("#category option[data-ko]").forEach(option => { option.textContent = option.dataset[language]; });
    document.getElementById("foodNameLabel").textContent = lang.foodNameLabel;
    document.getElementById("foodName").placeholder = lang.foodNamePlaceholder;
    setRequiredLabel("addressLabel", lang.addressLabel);
    document.getElementById("postcode").placeholder = lang.postcodePlaceholder;
    document.getElementById("addressSearchBtn").value = lang.addressSearchBtn;
    document.getElementById("address").placeholder = lang.addressPlaceholder;
    document.getElementById("detailAddress").placeholder = lang.detailAddressPlaceholder;
    document.getElementById("submitBtn").textContent = lang.submitBtn;
    document.getElementById("modalTitle").textContent = lang.modalTitle;
    document.getElementById("searchQuery").placeholder = lang.searchQueryPlaceholder;
    document.getElementById("searchBtn").value = lang.searchBtn;
    resetSearchResults();
  }


  function loadGoogleMaps(language) {
    const googleLanguage = GOOGLE_MAP_LANGUAGE[language] || "en";

    if (window.google?.maps?.places) {
      initMapService();
      return;
    }

    if (mapsScript) mapsScript.remove();

    mapsScript = document.createElement("script");
    const existingApiKey = "AIzaSyBQ6ok_TDzKlb6TTEiqpWuZY50ybfv7PEw";

    mapsScript.src =
      "https://maps.googleapis.com/maps/api/js" +
      "?key=" + encodeURIComponent(existingApiKey) +
      "&libraries=places" +
      "&language=" + encodeURIComponent(googleLanguage) +
      "&region=KR" +
      "&callback=initMapService";

    mapsScript.async = true;
    mapsScript.defer = true;
    mapsScript.onerror = function () {
      document.getElementById("results").innerHTML =
        '<div class="status error">' + escapeHtml(t().apiFailure) + '</div>';
    };

    document.head.appendChild(mapsScript);
  }

  function handleLanguageChange(language) {
    localStorage.setItem("selectedLanguage", language);
    location.reload();
  }

  function initMapService() {
    try {
      const map = new google.maps.Map(document.createElement("div"));
      placesService = new google.maps.places.PlacesService(map);
    } catch (error) {
      console.error("Google Maps initialization error:", error);
    }
  }

  window.gm_authFailure = function () { alert(t().apiFailure); };

  function openModal() {
    document.getElementById("modal").style.display = "block";
    setTimeout(() => document.getElementById("searchQuery").focus(), 50);
  }

  function closeModal() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("searchQuery").value = "";
    resetSearchResults();
  }

  function handleModalBackground(event) { if (event.target.id === "modal") closeModal(); }

  function resetSearchResults() {
    document.getElementById("results").innerHTML = '<div class="status">' + escapeHtml(t().initialStatus) + '</div>';
  }

  function searchPlace() {
    const query = document.getElementById("searchQuery").value.trim();
    const resultsBox = document.getElementById("results");
    if (!query) { resetSearchResults(); return; }
    if (typeof google === "undefined" || !google.maps || !google.maps.places || !placesService) {
      resultsBox.innerHTML = '<div class="status error">' + escapeHtml(t().apiNotReady) + '</div>';
      return;
    }
    resultsBox.innerHTML = '<div class="status">' + escapeHtml(t().searching) + '</div>';
    const request = { query: query, location: new google.maps.LatLng(37.5665,126.9780), radius: 50000 };
    placesService.textSearch(request, function(results, status) {
      if (status === google.maps.places.PlacesServiceStatus.OK && Array.isArray(results) && results.length) {
        resultsBox.innerHTML = "";
        results.forEach(place => {
          const div = document.createElement("div");
          div.className = "result-item";
          div.innerHTML = "<strong>" + escapeHtml(place.name || "") + "</strong><br><small>" + escapeHtml(place.formatted_address || "") + "</small>";
          div.onclick = () => selectPlace(place);
          resultsBox.appendChild(div);
        });
        return;
      }
      let message = t().noResults;
      if (status === google.maps.places.PlacesServiceStatus.REQUEST_DENIED) message = t().placesApiRequired;
      else if (status === google.maps.places.PlacesServiceStatus.OVER_QUERY_LIMIT) message = t().billingRequired;
      resultsBox.innerHTML = '<div class="status error">' + escapeHtml(message) + '</div>';
    });
  }

  function selectPlace(place) {
    placesService.getDetails({ placeId: place.place_id, fields: ["address_components", "formatted_address"] }, function(detail, status) {
      let postcode = "";
      let selectedAddress = place.formatted_address || "";
      if (status === google.maps.places.PlacesServiceStatus.OK && detail) {
        selectedAddress = detail.formatted_address || selectedAddress;
        if (Array.isArray(detail.address_components)) {
          detail.address_components.forEach(component => {
            if (component.types.includes("postal_code")) postcode = component.long_name;
          });
        }
      }
      document.getElementById("address").value = selectedAddress;
      document.getElementById("postcode").value = postcode || "N/A";
      closeModal();
      document.getElementById("detailAddress").focus();
    });
  }

  function submitForm(event) {
    event.preventDefault();
    const form = event.target;
    if (!form.checkValidity()) { form.reportValidity(); return; }
    if (!document.getElementById("address").value.trim()) {
      alert(t().addressRequired);
      openModal();
      return;
    }
    const data = {
      language: currentLanguage,
      userId: document.getElementById("userId").value.trim(),
      payerName: document.getElementById("payerName").value.trim(),
      category: document.getElementById("category").value,
      categoryText: document.getElementById("category").selectedOptions[0].textContent,
      foodName: document.getElementById("foodName").value.trim(),
      postcode: document.getElementById("postcode").value.trim(),
      address: document.getElementById("address").value.trim(),
      detailAddress: document.getElementById("detailAddress").value.trim()
    };
    if (isSubmitting || sessionStorage.getItem("orderSubmitted") === "1") return;

    isSubmitting = true;
    const submitBtn = document.getElementById("submitBtn");
    submitBtn.disabled = true;
    submitBtn.textContent = t().submitting;

    // 현재는 테스트용입니다. Google Sheets 연동 후에는
    // Apps Script의 성공 응답을 받은 뒤 showCompletionPage(data)를 호출하세요.
    console.log(data);
    sessionStorage.setItem("orderSubmitted", "1");
    sessionStorage.setItem("submittedOrderData", JSON.stringify(data));
    showCompletionPage(data);
  }

  function showCompletionPage(data) {
    document.querySelector(".container:not(#completionPage)").style.display = "none";
    document.getElementById("modal").style.display = "none";

    document.getElementById("completionTitle").textContent = t().completionTitle;
    document.getElementById("completionMessage").innerHTML = t().completionMessage;

    const food = [data.categoryText, data.foodName].filter(Boolean).join(" / ") || "-";
    const fullAddress = [data.address, data.detailAddress].filter(Boolean).join(" ");

    document.getElementById("completionSummary").innerHTML =
      "<strong>" + escapeHtml(t().completionId) + ":</strong> " + escapeHtml(data.userId || "-") + "<br>" +
      "<strong>" + escapeHtml(t().completionPayer) + ":</strong> " + escapeHtml(data.payerName || "-") + "<br>" +
      "<strong>" + escapeHtml(t().completionFood) + ":</strong> " + escapeHtml(food) + "<br>" +
      "<strong>" + escapeHtml(t().completionAddress) + ":</strong> " + escapeHtml(fullAddress || "-");

    const completionPage = document.getElementById("completionPage");
    completionPage.style.display = "flex";
    window.scrollTo({ top: 0, behavior: "instant" });
    history.replaceState(null, "", location.href);
  }

  function escapeHtml(value) {
    return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
  }

  document.getElementById("searchQuery").addEventListener("keydown", function(event) {
    if (event.key === "Enter") { event.preventDefault(); searchPlace(); }
  });
  document.addEventListener("keydown", function(event) { if (event.key === "Escape") closeModal(); });
  const savedLanguage = localStorage.getItem("selectedLanguage") || "zh";
  const languageSelect = document.getElementById("languageSelect");
  languageSelect.value = savedLanguage;
  changeLanguage(savedLanguage);
  loadGoogleMaps(savedLanguage);

  if (sessionStorage.getItem("orderSubmitted") === "1") {
    try {
      const savedOrderData = JSON.parse(sessionStorage.getItem("submittedOrderData") || "{}");
      showCompletionPage(savedOrderData);
    } catch (error) {
      sessionStorage.removeItem("orderSubmitted");
      sessionStorage.removeItem("submittedOrderData");
    }
  }
</script>

</body>
</html>
