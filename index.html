<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>업그레이드된 입력 페이지 (구글 맵스)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #F9F9F9 ￼; }
        .container { background-color: white; padding: 30px; border-radius: 10px; max-width: 500px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #333; }
        input[type="text"], select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 15px; background-color: #007BFF ￼; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .lang-selector { text-align: right; margin-bottom: 20px; }
    </style>

    <script async src="maps.googleapis.com/maps/api/js?libraries=places&callback=initAutocomplete&…"></script>
</head>
<body>

<div class="container">
    <div class="lang-selector">
        <select id="langSelect" onchange="changeLanguage()" style="width: 120px;">
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
        </select>
    </div>

    <h2 id="pageTitle">정보 입력하기</h2>

    <form id="myForm" onsubmit="alert('제출 완료되었습니다!'); return false;">
        <div class="input-group">
            <label id="lblId">ID :</label>
            <input type="text" id="userId" name="userId" placeholder="请输入小红书ID" required>
        </div>

        <div class="input-group">
            <label id="lblStage1">1단계 (필수) :</label>
            <select id="category" name="category" required>
                <option value="">선택하세요 / Select / 请选择</option>
                <option value="chicken">Chicken / 炸鸡 (치킨)</option>
                <option value="pizza">Pizza / 比萨 (피자)</option>
                <option value="asian">Asian Food / 亚洲菜 (아시안)</option>
            </select>
        </div>

        <div class="input-group">
            <label id="lblStage2">2단계 (선택) :</label>
            <input type="text" list="foodList" id="foodName" name="foodName" placeholder="음식명 입력 및 브랜드 직접 입력">
            <datalist id="foodList">
                <option value="KFC"><option value="McDonald's"><option value="엽기떡볶이">
            </datalist>
        </div>

        <div class="input-group">
            <label id="lblAddress">주소 :</label>
            <input type="text" id="autocomplete-input" placeholder="Search address (주소 검색)" style="margin-bottom: 5px; border-color: #007BFF ￼; border-width: 2px;">

            <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                <input type="text" id="postcode" name="postcode" placeholder="Zipcode (우편번호)" readonly style="flex: 1; background-color: #eee;">
            </div>
            <input type="text" id="address" name="address" placeholder="Basic Address (기본 주소)" readonly style="margin-bottom: 5px; background-color: #eee;">
            <input type="text" id="detailAddress" name="detailAddress" placeholder="Detailed Address (상세 주소 입력)">
        </div>

        <button type="submit" id="btnSubmit" style="width: 100%; font-size: 16px;">제출하기</button>
    </form>
</div>

<script>
    // 언어 변경 기능 (이전과 동일)
    const translations = {
        ko: { title: "정보 입력하기", lblId: "ID :", lblStage1: "1단계 (필수) :", lblStage2: "2단계 (선택) :", lblAddress: "주소 :", btnSubmit: "제출하기" },
        en: { title: "Information Form", lblId: "ID :", lblStage1: "Step 1 (Required) :", lblStage2: "Step 2 (Optional) :", lblAddress: "Address :", btnSubmit: "Submit" },
        zh: { title: "信息输入", lblId: "ID :", lblStage1: "第一步（必填）:", lblStage2: "第二步（选填）:", lblAddress: "地址 :", btnSubmit: "提交" }
    };

    function changeLanguage() {
        const lang = document.getElementById("langSelect").value;
        const t = translations[lang];
        document.getElementById("pageTitle").innerText = t.title;
        document.getElementById("lblId").innerText = t.lblId;
        document.getElementById("lblStage1").innerText = t.lblStage1;
        document.getElementById("lblStage2").innerText = t.lblStage2;
        document.getElementById("lblAddress").innerText = t.lblAddress;
        document.getElementById("btnSubmit").innerText = t.btnSubmit;
    }

    // 🌟 구글 주소 자동완성 기능 활성화
    let autocomplete;
    function initAutocomplete() {
        // 검색창 지정
        const input = document.getElementById('autocomplete-input');
        // Places API 자동완성 연결
        autocomplete = new google.maps.places.Autocomplete(input, {
            fields: ["address_components", "formatted_address"],
            types: ["address"]
        });

        // 사용자가 주소를 선택했을 때 실행되는 함수
        autocomplete.addListener('place_changed', function() {
            const place = autocomplete.getPlace();
            if (!place.address_components) return;

            let postcode = "";
            // 우편번호 찾기
            for (const component of place.address_components) {
                if (component.types.includes("postal_code")) {
                    postcode = component.long_name;
                    break;
                }
            }

            // 결과값 넣기
            document.getElementById('address').value = place.formatted_address; // 기본 주소
            document.getElementById('postcode').value = postcode;               // 우편번호
            document.getElementById('detailAddress').focus();                   // 상세주소로 커서 이동
        });
    }

    window.onload = function() { changeLanguage(); };
</script>

</body>
</html>
