<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>주소 입력 페이지</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    .container {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h2 {
      margin-top: 0;
      font-size: 26px;
      text-align: center;
    }

    .input-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 15px;
    }

    input[type="text"],
    select {
      width: 100%;
      height: 52px;
      padding: 0 14px;
      border: 1px solid #d0d7de;
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
    }

    .readonly {
      background: #f1f3f5;
    }

    button,
    input[type="button"] {
      height: 52px;
      border: none;
      border-radius: 12px;
      background: #007bff;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover,
    input[type="button"]:hover {
      background: #005fd1;
    }

    .address-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .address-row input[type="text"] {
      flex: 1;
    }

    .address-row input[type="button"] {
      width: 120px;
      flex-shrink: 0;
    }

    #submitBtn {
      width: 100%;
      margin-top: 8px;
      font-size: 17px;
    }

    /* 모달 */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 9999;
      padding: 16px;
    }

    .modal-content {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      width: 100%;
      max-width: 640px;
      margin: 60px auto 0;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 16px;
      font-size: 28px;
      cursor: pointer;
      color: #666;
    }

    .search-box {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .search-box input[type="text"] {
      flex: 1;
    }

    .search-box input[type="button"] {
      width: 90px;
      flex-shrink: 0;
    }

    .results {
      margin-top: 16px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      max-height: 320px;
      overflow-y: auto;
    }

    .result-item {
      padding: 14px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
    }

    .result-item:hover {
      background: #f8fafc;
    }

    .result-item:last-child {
      border-bottom: none;
    }

    .status {
      padding: 18px;
      text-align: center;
      color: #666;
    }

    .error {
      color: #dc3545;
      font-weight: 700;
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .container {
        padding: 18px;
        border-radius: 16px;
      }

      h2 {
        font-size: 22px;
      }

      .address-row {
        flex-direction: column;
      }

      .address-row input[type="button"] {
        width: 100%;
      }

      .search-box {
        flex-direction: column;
      }

      .search-box input[type="button"] {
        width: 100%;
      }

      .modal-content {
        margin-top: 20px;
      }
    }
  </style>

  <!-- ★ 여기 API 키만 교체 -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBQ6ok_TDzKlb6TTEiqpWuZY50ybfv7PEw&libraries=places&callback=initMapService">
</script>
</head>
<body>

<div class="container">
  <h2>정보 입력하기</h2>

  <form onsubmit="submitForm(event)">

    <div class="input-group">
      <label>ID</label>
     <label for="userId">Red Note ID</label>

<input
    type="text"
    id="userId"
    placeholder="Red Note ID 입력"
    inputmode="numeric"
    pattern="[0-9]*"
    maxlength="20"
    oninput="this.value=this.value.replace(/[^0-9]/g,'')"
    required>
    </div>

    <div class="input-group">
      <label>카테고리</label>
      <select id="category" required>
        <option value="">선택하세요</option>
        <option>치킨</option>
        <option>피자</option>
        <option>한식</option>
        <option>떡볶이</option>
        <option>커피</option>
        <option>햄버거</option>
      </select>
    </div>

    <div class="input-group">
      <label>브랜드 / 음식명</label>
      <input type="text" id="foodName" placeholder="예: KFC, 엽기떡볶이" />
    </div>

    <div class="input-group">
      <label>주소</label>

      <div class="address-row">
        <input type="text" id="postcode" placeholder="우편번호" readonly class="readonly" />
        <input type="button" value="주소 검색" onclick="openModal()" />
      </div>

      <input type="text" id="address" placeholder="기본 주소" readonly class="readonly" style="margin-bottom:8px;" />

      <input type="text" id="detailAddress" placeholder="상세 주소 입력" />
    </div>

    <button id="submitBtn" type="submit">제출하기</button>
  </form>
</div>

<!-- 모달 -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>

    <h3>주소 검색</h3>

    <div class="search-box">
      <input type="text" id="searchQuery" placeholder="건물명 또는 주소 입력" />
      <input type="button" value="검색" onclick="searchPlace()" />
    </div>

    <div id="results" class="results">
      <div class="status">검색어를 입력하세요.</div>
    </div>
  </div>
</div>

<script>
  let placesService;

  function initMapService() {
    const map = new google.maps.Map(document.createElement("div"));
    placesService = new google.maps.places.PlacesService(map);
  }

  window.gm_authFailure = function () {
    alert(
      "구글 API 인증 실패\\n\\n" +
      "1. Maps JavaScript API 활성화\\n" +
      "2. Places API (Legacy) 활성화\\n" +
      "3. 결제 카드 등록 여부 확인"
    );
  };

  function openModal() {
    document.getElementById("modal").style.display = "block";
    document.getElementById("searchQuery").focus();
  }

  function closeModal() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("searchQuery").value = "";
    document.getElementById("results").innerHTML =
      '<div class="status">검색어를 입력하세요.</div>';
  }

  async function searchPlace() {
    const query = document.getElementById("searchQuery").value.trim();
    const resultsBox = document.getElementById("results");

    if (!query) return;

    resultsBox.innerHTML = '<div class="status">검색 중...</div>';

    const request = {
      query: query,
      location: new google.maps.LatLng(37.5665, 126.9780),
      radius: 50000
    };

    placesService.textSearch(request, function(results, status) {

      if (status === google.maps.places.PlacesServiceStatus.OK && results.length) {

        resultsBox.innerHTML = "";

        results.forEach(place => {

          const div = document.createElement("div");
          div.className = "result-item";

          div.innerHTML = `
            <strong>${place.name}</strong><br>
            <small>${place.formatted_address}</small>
          `;

          div.onclick = () => selectPlace(place);

          resultsBox.appendChild(div);
        });

      } else {

        let msg = "검색 결과가 없습니다.";

        if (status === "REQUEST_DENIED") {
          msg = '<span class="error">Places API (Legacy) 활성화 필요</span>';
        }

        if (status === "OVER_QUERY_LIMIT") {
          msg = '<span class="error">결제 카드 등록 필요</span>';
        }

        resultsBox.innerHTML = `<div class="status">${msg}</div>`;
      }
    });
  }

  function selectPlace(place) {

    placesService.getDetails(
      {
        placeId: place.place_id,
        fields: ["address_components", "formatted_address"]
      },
      function(detail, status) {

        let postcode = "";

        if (status === google.maps.places.PlacesServiceStatus.OK) {

          detail.address_components.forEach(c => {
            if (c.types.includes("postal_code")) {
              postcode = c.long_name;
            }
          });

          document.getElementById("address").value =
            detail.formatted_address;

        } else {

          document.getElementById("address").value =
            place.formatted_address;
        }

        document.getElementById("postcode").value = postcode || "N/A";

        closeModal();
        document.getElementById("detailAddress").focus();
      }
    );
  }

  function submitForm(e) {
    e.preventDefault();

    const data = {
      userId: document.getElementById("userId").value,
      category: document.getElementById("category").value,
      foodName: document.getElementById("foodName").value,
      postcode: document.getElementById("postcode").value,
      address: document.getElementById("address").value,
      detailAddress: document.getElementById("detailAddress").value
    };

    console.log(data);

    alert("제출 완료!");
  }

  document.getElementById("searchQuery").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      e.preventDefault();
      searchPlace();
    }
  });
</script>

</body>
</html>
